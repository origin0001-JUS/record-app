services:
  # Next.js Web App (Docker)
  - type: web
    name: record-app-web
    runtime: docker
    region: singapore
    plan: free
    rootDir: web
    dockerfilePath: ./Dockerfile
    envVars:
      - key: WORKER_URL
        sync: false
      - key: NODE_ENV
        value: production

  # Python FastAPI Worker
  - type: web
    name: record-app-worker
    runtime: python
    region: singapore
    plan: free
    rootDir: worker
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MAX_CONCURRENT_JOBS
        value: "2"
      - key: NOTEBOOKLM_AUTH_JSON
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
